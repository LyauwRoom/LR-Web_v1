<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyauw Room | 你的专属安心角落</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #F5F5DC;
            --text-main: #3E2723;
            --accent: #C08261;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 导航栏 */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: var(--white);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 700; font-size: 1.5rem; letter-spacing: 2px; }

        /* Hero 区域 - 带有视差效果倾向 */
        .hero {
            height: 80vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
            background: linear-gradient(rgba(245,245,220,0.5), rgba(245,245,220,0.5)), url('booking-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* 视差关键 */
        }

        .hero h1 { 
            font-family: 'Ma Shan Zheng', cursive; 
            font-size: clamp(3rem, 10vw, 5rem); 
            color: var(--accent);
            margin-bottom: 10px;
        }

        /* 内容板块样式 */
        section { padding: 80px 10%; }
        .section-title { font-size: 2rem; margin-bottom: 30px; text-align: center; }

        /* 博客卡片容器 */
        #blog-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .blog-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .blog-card:hover { transform: translateY(-10px); }
        .blog-card img { width: 100%; border-radius: 10px; margin-bottom: 15px; }

        footer {
            padding: 40px; text-align: center; background: var(--white);
            font-size: 0.8rem; letter-spacing: 1px;
        }

        /* WhatsApp 悬浮按钮 */
        .wa-float {
            position: fixed; bottom: 30px; right: 30px;
            background: #25D366; color: white; width: 60px; height: 60px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 30px; z-index: 1000; text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" id="site_name">Lyauw Room</div>
        <div class="nav-links">
            </div>
    </nav>

    <header class="hero" id="hero_bg_img">
        <h1 id="hero_title" data-aos="fade-up">你我的缘分</h1>
        <p id="hero_subtitle" data-aos="fade-up" data-aos-delay="200">请期待未来</p>
    </header>

    <section id="about">
        <h2 class="section-title" data-aos="fade-right">关于我们</h2>
        <p id="about_desc" data-aos="fade-left">正在加载内容...</p>
    </section>

    <section id="blog-section">
        <h2 class="section-title">疗愈日志</h2>
        <div id="blog-container">
            </div>
    </section>

    <a href="#" id="wa_link" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer id="footer_copy">
        © 2026 LYAUW ROOM PLT
    </footer>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        // 初始化动画
        AOS.init({ duration: 1000, once: true });

        async function loadCMS() {
            try {
                // 读取自动生成的 data.json
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();

                // 1. 渲染 Global 全局信息
                if (data.global) {
                    if (data.global.site_name) document.getElementById('site_name').innerText = data.global.site_name;
                    if (data.global.footer_copy) document.getElementById('footer_copy').innerText = data.global.footer_copy;
                    if (data.global.wa_number) document.getElementById('wa_link').href = `https://wa.me/${data.global.wa_number}`;
                }

                // 2. 渲染 Static Pages 静态文案
                if (data.static_pages) {
                    for (const id in data.static_pages) {
                        const el = document.getElementById(id);
                        if (el) {
                            // 如果是背景图
                            if (id === 'hero_bg_img') {
                                el.style.backgroundImage = `linear-gradient(rgba(245,245,220,0.5), rgba(245,245,220,0.5)), url('${data.static_pages[id]}')`;
                            } else {
                                el.innerHTML = data.static_pages[id];
                            }
                        }
                    }
                }

                // 3. 动态渲染 Blog (这是最酷的部分)
                const blogContainer = document.getElementById('blog-container');
                if (data.blog && data.blog.length > 0) {
                    blogContainer.innerHTML = ''; // 清空加载中
                    data.blog.forEach(post => {
                        if (post.status === 'published') {
                            const card = `
                                <div class="blog-card" data-aos="zoom-in">
                                    <img src="${post.thumbnail || 'booking-bg.png'}" alt="${post.title}">
                                    <h3>${post.title}</h3>
                                    <small>${post.date} | ${post.category}</small>
                                    <p>${post.excerpt}</p>
                                </div>
                            `;
                            blogContainer.innerHTML += card;
                        }
                    });
                }

            } catch (error) {
                console.error("加载云端数据失败:", error);
            }
        }

        window.onload = loadCMS;
    </script>
</body>
</html>
