<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyauw Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #F5F5DC; --text-main: #3E2723; --accent: #C08261; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; }
        nav { padding: 20px 8%; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; }
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-size: cover; background-attachment: fixed; text-align: center; }
        .hero h1 { font-family: 'Ma+Shan+Zheng', cursive; font-size: 4rem; color: var(--accent); margin: 0; }
        section { padding: 80px 10%; text-align: center; }
        #blog-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
        .blog-card { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .blog-card img { width: 100%; height: 200px; object-fit: cover; }
        .blog-card div { padding: 20px; }
        footer { padding: 40px; text-align: center; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

    <nav><div class="logo" id="site_name">Loading...</div></nav>

    <header class="hero" id="hero_bg_img">
        <h1 id="hero_title" data-aos="fade-up">...</h1>
        <p id="hero_subtitle" data-aos="fade-up" data-aos-delay="200">...</p>
    </header>

    <section id="about">
        <h2 data-aos="fade-up">关于我们</h2>
        <div id="about_desc" data-aos="fade-up" data-aos-delay="300">加载中...</div>
    </section>

    <section id="blogs">
        <h2>疗愈日志</h2>
        <div id="blog-container"></div>
    </section>

    <footer id="footer_copy"></footer>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });

        async function init() {
            try {
                // 核心改动：直接请求当前目录下的 data.json
                const res = await fetch('data.json?v=' + Date.now());
                if (!res.ok) throw new Error("找不到 data.json，请检查 GitHub Actions 是否运行成功");
                
                const data = await res.json();

                // 渲染全局
                if (data.global) {
                    document.getElementById('site_name').innerText = data.global.site_name || 'LR';
                    document.getElementById('footer_copy').innerText = data.global.footer_copy || '';
                }

                // 渲染静态文案
                if (data.static_pages) {
                    for (let id in data.static_pages) {
                        const el = document.getElementById(id);
                        if (el) {
                            if (id === 'hero_bg_img') el.style.backgroundImage = `url('${data.static_pages[id]}')`;
                            else el.innerHTML = data.static_pages[id];
                        }
                    }
                }

                // 渲染博客 (使用新标题名)
                const container = document.getElementById('blog-container');
                if (data.blog) {
                    data.blog.filter(p => p.status === 'published').forEach(post => {
                        container.innerHTML += `
                            <div class="blog-card" data-aos="zoom-in">
                                <img src="${post.thumbnail || 'booking-bg.png'}">
                                <div>
                                    <h3>${post.title}</h3>
                                    <p>${post.excerpt}</p>
                                    <small>${post.date}</small>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                console.error(err);
                document.getElementById('about_desc').innerText = "数据同步中，请稍后再试: " + err.message;
            }
        }
        window.onload = init;
    </script>
</body>
</html>
