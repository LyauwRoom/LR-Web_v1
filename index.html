<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyauw Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        :root { --bg-color: #F5F5DC; --text-main: #3E2723; --accent: #C08261; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; }
        
        /* 导航栏结构 */
        nav { padding: 20px 8%; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 1.2rem; }
        
        /* 首屏结构 */
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-size: cover; background-position: center; background-color: #eaddcf; text-align: center; position: relative; }
        .hero h1 { font-family: 'Ma Shan Zheng', cursive; font-size: 4rem; color: var(--accent); margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; opacity: 0.8; }
        
        /* 区块结构 */
        section { padding: 80px 10%; text-align: center; }
        #blog-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 40px; }
        
        /* 博客卡片结构 */
        .blog-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: left; }
        .blog-card img { width: 100%; height: 180px; object-fit: cover; }
        .blog-card-body { padding: 20px; }
        
        /* 页脚结构 */
        footer { padding:40px; text-align:center; opacity:0.6; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav>
        <div class="logo" id="site_name">Lyauw Room</div>
    </nav>

    <header class="hero" id="hero_bg_img">
        <h1 id="hero_title" data-aos="fade-up">欢迎来到 Lyauw Room</h1>
        <p id="hero_subtitle" data-aos="fade-up" data-aos-delay="200">你的疗愈空间</p>
    </header>

    <section id="about">
        <h2 data-aos="fade-up">关于我们</h2>
        <div id="about_desc" data-aos="fade-up" data-aos-delay="300">
            <p>这里是默认的关于我们介绍。请在 Google Sheet 的 Static Pages 中添加 html_ID 为 about_desc 的内容来替换这段文字。</p>
        </div>
    </section>

    <section id="blogs">
        <h2 data-aos="fade-up">疗愈日志</h2>
        <div id="blog-container">
            <p style="text-align: center; width: 100%;">暂无文章，或正在从数据库读取中...</p>
        </div>
    </section>

    <footer>
        <span id="footer_copy">© 2024 Lyauw Room. All rights reserved.</span>
    </footer>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init();
        async function init() {
            try {
                // 1. 读取数据
                const res = await fetch('web_v1/data.json?v=' + Date.now());
                if (!res.ok) return; // 如果读不到就不报错，直接显示默认排版
                
                const data = await res.json();
                console.log("成功读取的数据:", data); // 方便你在 F12 控制台查看数据到底长什么样

                // 2. 注入 Global 数据
                if (data.global && data.global.site_name) {
                    document.getElementById('site_name').innerText = data.global.site_name;
                }
                if (data.global && data.global.footer_copy) {
                    document.getElementById('footer_copy').innerText = data.global.footer_copy;
                }

                // 3. 注入 Static Pages 数据 (核心替换逻辑)
                if (data.static_pages) {
                    for (let id in data.static_pages) {
                        const el = document.getElementById(id);
                        if (el) {
                            if (id === 'hero_bg_img' && data.static_pages[id]) {
                                el.style.backgroundImage = `url('${data.static_pages[id]}')`;
                            } else if (data.static_pages[id]) {
                                el.innerHTML = data.static_pages[id]; // 替换内容
                            }
                        }
                    }
                }

                // 4. 注入 Blog 数据
                if (data.blog && data.blog.length > 0) {
                    const container = document.getElementById('blog-container');
                    let hasPublished = false;
                    let blogHtml = '';
                    
                    data.blog.forEach(post => {
                        const status = post.status || post['status (状态)'];
                        if (status === 'published') {
                            hasPublished = true;
                            blogHtml += `
                                <div class="blog-card" data-aos="fade-up">
                                    <img src="${post.thumbnail || 'https://via.placeholder.com/400x200?text=Lyauw+Room'}">
                                    <div class="blog-card-body">
                                        <h3>${post.title || '无标题'}</h3>
                                        <p>${post.excerpt || ''}</p>
                                        <small>${post.date || ''}</small>
                                    </div>
                                </div>`;
                        }
                    });
                    
                    if (hasPublished) {
                        container.innerHTML = blogHtml;
                    }
                }
            } catch (err) {
                console.error("同步内容失败，显示默认排版:", err);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
