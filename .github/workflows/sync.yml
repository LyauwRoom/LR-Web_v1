name: Sync Google Sheet Data

on:
  workflow_dispatch: # 允许手动点击按钮运行
  schedule:
    - cron: '0 * * * *' # 每小时自动运行一次（可选）
  push:
    branches: [ main ] # 当你修改代码时也会运行

jobs:
  sync-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: os-actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sync Script
        run: python sync_data.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add web_v1/data.json
          # 如果没有变化，就不报错继续执行
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新数据: $(date)" && git push)