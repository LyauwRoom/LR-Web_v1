<section class="container">
    <h1>咨询 <span class="cursive">Inquiry</span></h1>
    <p>为了确保彼此的舒适与尊重，我们的服务通常会安排在氛围轻松、环境安全的公共空间（例如安静的连锁咖啡厅），让你在最自然的状态下享受这段对话。</p>
    
    <form style="margin-top: 50px; max-width: 600px;">
        <div style="margin-bottom: 20px;">
            <label>姓名 Name</label>
            <input type="text" style="width:100%; padding:12px; margin-top:8px; border:1px solid #DDD;">
        </div>
        <div style="margin-bottom: 20px;">
            <label>联络号码 Contact Number</label>
            <input type="tel" style="width:100%; padding:12px; margin-top:8px; border:1px solid #DDD;">
        </div>
        <div style="margin-bottom: 20px;">
            <label>电邮 Email</label>
            <input type="email" style="width:100%; padding:12px; margin-top:8px; border:1px solid #DDD;">
        </div>
        <div style="margin-bottom: 20px;">
            <label>回馈/询问 Feedback / Inquiry</label>
            <textarea rows="5" style="width:100%; padding:12px; margin-top:8px; border:1px solid #DDD;"></textarea>
        </div>
        <button type="submit" class="btn" style="border:none; cursor:pointer; width:100%;">提交申请 SUBMIT</button>
    </form>
</section>
