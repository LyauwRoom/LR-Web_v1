<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咨询 | Lyauw Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #F5F5DC; --text-main: #3E2723; --accent-color: #C08261; --white: #FFFFFF; --font-serif: 'Playfair Display', serif; --font-sans: 'Inter', sans-serif; --font-cursive: 'Ma Shan Zheng', cursive; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background-color: var(--bg-color); color: var(--text-main); line-height: 1.8; }
        .cursive { font-family: var(--font-cursive); color: var(--accent-color); font-size: 1.2em; vertical-align: middle; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 0 8%; height: 80px; background: var(--white); position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.02); }
        .logo img { height: 42px; width: auto; display: block; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--text-main); font-size: 0.85rem; letter-spacing: 1px; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent-color); }

        .page-content { padding: 80px 10%; max-width: 800px; margin: 0 auto; }
        .page-content h1 { font-family: var(--font-serif); font-size: 3rem; margin-bottom: 20px; text-align: center; }
        
        .disclaimer { margin: 40px 0; padding: 30px; background: rgba(255,255,255,0.5); border: 1px solid #EADDCD; font-size: 0.95rem; }
        
        form { background: var(--white); padding: 50px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 15px; border: 1px solid #DDD; border-radius: 4px; font-family: var(--font-sans); outline: none; }
        input:focus, textarea:focus { border-color: var(--accent-color); }
        .submit-btn { background: var(--text-main); color: var(--white); border: none; padding: 18px; width: 100%; font-size: 1rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: var(--accent-color); }

        .wa-float { position: fixed; bottom: 30px; right: 30px; background-color: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; z-index: 2000; text-decoration: none; }
        footer { background: var(--white); padding: 60px 20px; text-align: center; border-top: 1px solid #EEE; font-size: 0.75rem; letter-spacing: 2px; }
        @media (max-width: 768px) { .nav-links { display: none; } form { padding: 30px 20px; } }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html"><img src="logo.png" alt="Lyauw Room"></a></div>
        <div class="nav-links">
            <a href="about.html">聊 About</a>
            <a href="listen.html">听 Listen</a>
            <a href="talk.html">说 Talk</a>
            <a href="contact.html" style="color:var(--accent-color);">询 Contact</a>
            <a href="booking.html">预约 Booking</a>
        </div>
    </nav>

    <div class="page-content">
        <h1>咨询 <span class="cursive">Inquiry</span></h1>
        
        <div class="disclaimer">
            <p>为了确保彼此的舒适与尊重，我们的服务通常会安排在氛围轻松、环境安全的公共空间（例如安静的连锁咖啡厅），让你在最自然的状态下享受这段对话。</p>
            <p style="margin-top: 10px;">我们致力于提供一个基于相互尊重的专业环境，让你能安心地做回自己。如有疑问，请填写下方表格联系我们。</p>
        </div>

        <form>
            <div class="form-group">
                <label>姓名 Name</label>
                <input type="text" required>
            </div>
            <div class="form-group">
                <label>联络号码 Phone Number</label>
                <input type="tel" required>
            </div>
            <div class="form-group">
                <label>电邮 Email</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>回馈/咨询内容 Feedback / Message</label>
                <textarea rows="5" required></textarea>
            </div>
            <button type="submit" class="submit-btn">提交咨询 SUBMIT</button>
        </form>
    </div>

    <a href="https://wa.me/60122395001" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <footer>&copy; 2026 LYAUW ROOM PLT · PEOPLE FIRST · RADICAL EMPATHY</footer>
</body>
</html>
