        .booking-btn:hover { background: var(--accent-color); transform: translateY(-3px); }

        .wa-float { position: fixed; bottom: 30px; right: 30px; background-color: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; z-index: 2000; text-decoration: none; }
        footer { background: var(--white); padding: 60px 20px; text-align: center; border-top: 1px solid #EEE; font-size: 0.75rem; letter-spacing: 2px; }
        @media (max-width: 768px) { .nav-links { display: none; } }
